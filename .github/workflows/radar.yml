name: 阿福热点选题雷达

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成选题雷达并推送钉钉
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
          DINGTALK_SECRETS: ${{ secrets.DINGTALK_SECRETS }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          MAX_TOPICS: "8"
          MIN_SCORE: "60"
          SENT_TOPICS_FILE: data/sent_topics.json
        run: python scripts/radar.py

      - name: 提交去重状态
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_topics.json
          git diff --staged --quiet || git commit -m "更新热点雷达去重状态 [skip ci]"
          git pull --rebase origin main
          git push

